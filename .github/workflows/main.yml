name: Deploy Heroku

on:
  push:
    branches: [ main ]
    
  workflow_dispatch:
  
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest
          pip install importlib-metadata==4.13.0

      - name: Run tests
        run: make test
